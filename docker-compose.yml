services:
  db:
    image: postgres:16-alpine
    container_name: innotech-kanban-postgres
    environment:
      POSTGRES_DB: kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
    ports:
      - "55432:5432"
    volumes:
      - kanban-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kanban-postgres-data:
